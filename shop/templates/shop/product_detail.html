{% extends 'shop/base.html' %}
{% block title %}{{ product.name }} | anomal{% endblock %}
{% block content %}
  <div class="flex flex-col lg:flex-row gap-10">
    <!-- 이미지 -->
    <div class="lg:w-1/2">
      <img
        src="{% static 'shop/images/' %}{{ product.image.name|cut:'products/' }}"
        alt="{{ product.name }}"
        class="w-full rounded-lg shadow"
      >
    </div>
    <!-- 상세 정보 -->
    <div class="lg:w-1/2 space-y-6">
      <h1 class="text-4xl font-bold">{{ product.name }}</h1>
      <p class="text-3xl text-indigo-600 font-semibold">{{ product.price }}원</p>
      <p class="text-gray-700 whitespace-pre-line">{{ product.description }}</p>
      <button class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg transition">
        장바구니에 담기
      </button>
    </div>
  </div>
{% endblock %}
