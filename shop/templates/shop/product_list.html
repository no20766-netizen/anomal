{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>anomal – 제품 리스트</title>
</head>
<body>
  <h1>제품 목록</h1>
  {% for product in products %}
    <div style="margin-bottom:20px;">
      <h2>
        <a href="{% url 'product_detail' product.pk %}">
          {{ product.name }}
        </a>
      </h2>
      <p>{{ product.price }}원</p>
      {# static 경로와 파일명을 분리합니다 #}
      <img
        src="{% static 'shop/images/' %}{{ product.image.name|cut:'products/' }}"
        alt="{{ product.name }}"
        width="200"
      >
    </div>
  {% endfor %}
</body>
</html>
