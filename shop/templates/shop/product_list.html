{% extends 'shop/base.html' %}
{% block title %}제품 목록 | anomal{% endblock %}
{% block content %}
  <h1 class="text-3xl font-semibold mb-6">제품 목록</h1>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for product in products %}
      <div class="bg-white rounded-lg shadow hover:shadow-lg transition overflow-hidden">
        <a href="{% url 'product_detail' product.pk %}">
          <img
            class="w-full h-48 object-cover"
            src="{% static 'shop/images/' %}{{ product.image.name|cut:'products/' }}"
            alt="{{ product.name }}"
          >
          <div class="p-4">
            <h2 class="text-xl font-medium text-gray-800">{{ product.name }}</h2>
            <p class="mt-2 text-indigo-600 font-bold">{{ product.price }}원</p>
          </div>
        </a>
      </div>
    {% endfor %}
  </div>
{% endblock %}
